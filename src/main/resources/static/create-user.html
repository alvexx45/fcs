<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCS - Criar Conta</title>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="container">
        <div class="auth-container">
            <div class="row g-0">
                <!-- Left Side -->
                <div class="col-lg-5 d-none d-lg-block">
                    <div class="auth-left register h-100">
                        <div>
                            <i class="bi bi-person-plus mb-4" style="font-size: 5rem;"></i>
                            <h2 class="mb-3 text-white">Junte-se a nós!</h2>
                            <p class="mb-0 opacity-75">Crie sua conta e comece a controlar suas finanças hoje mesmo de forma simples e eficaz.</p>
                        </div>
                    </div>
                </div>
                
                <!-- Right Side -->
                <div class="col-lg-7">
                    <div class="auth-right">
                        <a href="/" class="btn btn-link text-decoration-none p-0 mb-4 text-secondary">
                            <i class="bi bi-arrow-left"></i> Voltar para home
                        </a>
                        
                        <h2 class="mb-1">Criar Conta</h2>
                        <p class="text-secondary mb-4">Preencha os dados abaixo para começar</p>
                        
                        <form id="createUserForm" onsubmit="createUser(event)">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-medium">Usuário *</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0">
                                        <i class="bi bi-person text-secondary"></i>
                                    </span>
                                    <input 
                                        type="text" 
                                        class="form-control border-start-0 ps-0" 
                                        id="username" 
                                        name="username"
                                        placeholder="Escolha um nome de usuário" 
                                        required
                                        minlength="3"
                                    >
                                </div>
                                <small class="text-secondary opacity-75">Mínimo de 3 caracteres</small>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-medium">Senha *</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0">
                                        <i class="bi bi-lock text-secondary"></i>
                                    </span>
                                    <input 
                                        type="password" 
                                        class="form-control border-start-0 ps-0" 
                                        id="password" 
                                        name="password"
                                        placeholder="Crie uma senha segura" 
                                        required
                                        minlength="6"
                                    >
                                </div>
                                <small class="text-secondary opacity-75">Mínimo de 6 caracteres</small>
                            </div>
                            
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label text-secondary small" for="terms">
                                    Eu concordo com os <a href="#" class="text-primary text-decoration-none fw-semibold">termos de uso</a> e política de privacidade.
                                </label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 mb-4" style="background: var(--success); border-color: var(--success);">
                                <i class="bi bi-person-check"></i> Criar Conta
                            </button>
                            
                            <div class="position-relative mb-4">
                                <hr class="text-secondary opacity-25">
                                <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-secondary small">ou</span>
                            </div>
                            
                            <div class="text-center">
                                <p class="text-secondary mb-0">
                                    Já tem uma conta? 
                                    <a href="login.html" class="text-primary text-decoration-none fw-semibold">Faça login</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Seu JavaScript aqui -->
    <script src="script/user.js"></script>
</body>
</html>
